services:
  contenthub-postgres:
    image: postgres:16
    container_name: contenthub-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: contenthub
      POSTGRES_USER: contenthub
      POSTGRES_PASSWORD: contenthub

    ports:
      - "5432:5432"

    volumes:
      - contenthub_postgres_data:/var/lib/postgresql/data

  contenthub-redis:
    image: redis:7.4-alpine
    container_name: contenthub-redis
    restart: unless-stopped

    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]

    ports:
      - "6379:6379"

    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - contenthub_redis_data:/data

volumes:
  contenthub_postgres_data:
  contenthub_redis_data:
